<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }

    #menu {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, #f0f4f8, #d9e2ec);
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 20px 20px;
      z-index: 100;
    }
    #menu.hidden { display: none; }

    #menu h2 {
      font-size: 14px; font-weight: 400;
      color: #718096; margin-bottom: 16px;
    }

    .game-cards {
      width: 100%; max-width: 320px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .game-card {
      display: flex; align-items: center;
      background: #fff; border: 1px solid #e2e8f0;
      border-radius: 4px; height: 72px;
      cursor: pointer; overflow: hidden;
      transition: background 0.15s;
    }
    .game-card:hover { background: #edf2f7; }
    .game-card:active { background: #e2e8f0; }

    .game-card canvas {
      width: 72px; height: 72px; flex-shrink: 0;
      border-radius: 4px 0 0 4px;
    }

    .game-card-info {
      flex: 1; padding: 0 14px; min-width: 0;
    }
    .game-card-info .name {
      font-size: 16px; font-weight: bold; color: #2d3748;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .game-card-info .subtitle {
      font-size: 12px; color: #a0aec0; margin-top: 4px;
    }

    .game-card .arrow {
      flex-shrink: 0; padding-right: 16px;
      font-size: 16px; color: #cbd5e0;
    }

    .coming-soon {
      display: flex; align-items: center;
      background: rgba(247,250,252,0.5);
      border: 1.5px dashed #e2e8f0; border-radius: 4px;
      height: 72px; padding: 0 14px;
    }
    .coming-soon .plus {
      font-size: 24px; color: #cbd5e0;
      width: 56px; text-align: center; flex-shrink: 0;
    }
    .coming-soon span {
      font-size: 13px; color: #a0aec0;
    }
  </style>
</head>
<body>
  <div id="menu">
    <h2>Pick a game to play</h2>
    <div class="game-cards" id="game-cards"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
